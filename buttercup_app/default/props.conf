# Tell Splunk how to parse the CSV files — first row is the header

[buttercup_sales]
INDEXED_EXTRACTIONS = csv
FIELD_HEADER_REGEX = 0

[buttercup_products]
INDEXED_EXTRACTIONS = csv
FIELD_HEADER_REGEX = 0

# Apache Combined log format — custom sourcetype avoids conflicts with
# Splunk's built-in access_combined processing in the Docker image.
[buttercup_web]
SHOULD_LINEMERGE = false
LINE_BREAKER = ([\r\n]+)
DATETIME_CONFIG = CURRENT
KV_MODE = none
