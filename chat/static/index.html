<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ask Splunk — Buttercup Games Lab</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #252833;
    --border: #2e3140;
    --text: #e4e6eb;
    --text-dim: #8b8fa3;
    --accent: #7c5cfc;
    --accent-hover: #9478ff;
    --user-bg: #2a2540;
    --assistant-bg: #1e2230;
    --tool-bg: #1c2418;
    --tool-border: #2d3a25;
    --green: #4ade80;
    --red: #f87171;
    --yellow: #fbbf24;
    --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    --mono: "SF Mono", "Fira Code", "Cascadia Code", monospace;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: var(--font); background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; }

  /* Header */
  header {
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 12px;
    background: var(--surface);
  }
  header h1 { font-size: 18px; font-weight: 600; }
  header .badge {
    font-size: 11px; padding: 3px 8px; border-radius: 12px;
    background: var(--surface2); color: var(--text-dim);
  }
  header .status { margin-left: auto; font-size: 12px; display: flex; align-items: center; gap: 6px; }
  header .dot { width: 8px; height: 8px; border-radius: 50%; }
  header .dot.ok { background: var(--green); }
  header .dot.err { background: var(--red); }
  header .dot.warn { background: var(--yellow); }

  /* Chat area */
  #chat { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 16px; }
  .msg { max-width: 720px; line-height: 1.6; }
  .msg.user { align-self: flex-end; background: var(--user-bg); padding: 12px 16px; border-radius: 16px 16px 4px 16px; }
  .msg.assistant { align-self: flex-start; background: var(--assistant-bg); padding: 12px 16px; border-radius: 16px 16px 16px 4px; }
  .msg.assistant pre { background: var(--surface2); padding: 10px 14px; border-radius: 8px; overflow-x: auto; margin: 8px 0; font-family: var(--mono); font-size: 13px; }
  .msg.assistant code { font-family: var(--mono); font-size: 13px; background: var(--surface2); padding: 2px 5px; border-radius: 4px; }
  .msg.assistant pre code { background: none; padding: 0; }

  /* Tool call cards */
  .tool-card {
    align-self: flex-start; background: var(--tool-bg); border: 1px solid var(--tool-border);
    border-radius: 8px; padding: 10px 14px; font-size: 13px; max-width: 720px; width: 100%;
  }
  .tool-card summary { cursor: pointer; color: var(--green); font-family: var(--mono); font-weight: 500; }
  .tool-card pre { margin-top: 8px; font-size: 12px; white-space: pre-wrap; word-break: break-word; color: var(--text-dim); max-height: 200px; overflow-y: auto; }

  /* Starters */
  #starters { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; padding: 16px 24px; }
  .starter {
    background: var(--surface2); border: 1px solid var(--border); color: var(--text);
    padding: 8px 14px; border-radius: 20px; cursor: pointer; font-size: 13px; transition: 0.15s;
  }
  .starter:hover { border-color: var(--accent); color: var(--accent); }

  /* Input bar */
  #input-bar {
    padding: 16px 24px; border-top: 1px solid var(--border); background: var(--surface);
    display: flex; gap: 10px; align-items: flex-end;
  }
  #input-bar textarea {
    flex: 1; resize: none; background: var(--surface2); border: 1px solid var(--border);
    color: var(--text); padding: 10px 14px; border-radius: 12px; font-family: var(--font);
    font-size: 14px; line-height: 1.5; outline: none; min-height: 44px; max-height: 120px;
  }
  #input-bar textarea:focus { border-color: var(--accent); }
  #input-bar textarea::placeholder { color: var(--text-dim); }
  #send-btn {
    background: var(--accent); color: #fff; border: none; width: 44px; height: 44px;
    border-radius: 12px; cursor: pointer; font-size: 18px; display: flex; align-items: center;
    justify-content: center; transition: 0.15s; flex-shrink: 0;
  }
  #send-btn:hover { background: var(--accent-hover); }
  #send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* No API key overlay */
  #no-key {
    flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 32px; text-align: center; gap: 16px;
  }
  #no-key h2 { font-size: 20px; }
  #no-key p { color: var(--text-dim); max-width: 480px; line-height: 1.6; }
  #no-key code { background: var(--surface2); padding: 2px 6px; border-radius: 4px; font-family: var(--mono); }

  /* Loading */
  .typing { align-self: flex-start; padding: 12px 16px; color: var(--text-dim); font-style: italic; font-size: 14px; }
</style>
</head>
<body>

<header>
  <h1>🔍 Ask Splunk</h1>
  <span class="badge" id="model-badge"></span>
  <div class="status">
    <span class="dot" id="status-dot"></span>
    <span id="status-text">Connecting…</span>
  </div>
</header>

<div id="no-key" style="display:none">
  <h2>API Key Required</h2>
  <p>Add your Anthropic API key to <code>.env</code> to enable the chat:</p>
  <pre style="background:var(--surface2);padding:14px 20px;border-radius:8px;font-family:var(--mono);font-size:13px;text-align:left">ANTHROPIC_API_KEY=sk-ant-...</pre>
  <p>Then restart the stack: <code>docker compose up -d</code></p>
</div>

<div id="chat"></div>

<div id="starters">
  <button class="starter" onclick="send('What indexes are available?')">What indexes are available?</button>
  <button class="starter" onclick="send('Show me the top 5 vendors by revenue')">Top vendors by revenue</button>
  <button class="starter" onclick="send('How many HTTP 500 errors are in the access logs?')">HTTP 500 error count</button>
  <button class="starter" onclick="send('What products are in the catalogue?')">Product catalogue</button>
</div>

<div id="input-bar">
  <textarea id="input" placeholder="Ask a question about the Buttercup Games data…" rows="1"
    onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendInput()}"></textarea>
  <button id="send-btn" onclick="sendInput()" title="Send">➤</button>
</div>

<script>
const chatEl = document.getElementById('chat');
const inputEl = document.getElementById('input');
const sendBtn = document.getElementById('send-btn');
const startersEl = document.getElementById('starters');
const noKeyEl = document.getElementById('no-key');
const statusDot = document.getElementById('status-dot');
const statusText = document.getElementById('status-text');
const modelBadge = document.getElementById('model-badge');

let history = [];
let busy = false;

async function checkHealth() {
  try {
    const res = await fetch('/api/health');
    const data = await res.json();
    modelBadge.textContent = data.model || '';
    if (!data.anthropic_api_key_set) {
      noKeyEl.style.display = 'flex';
      chatEl.style.display = 'none';
      startersEl.style.display = 'none';
      document.getElementById('input-bar').style.display = 'none';
      statusDot.className = 'dot err';
      statusText.textContent = 'No API key';
      return;
    }
    if (data.mcp_tools_loaded) {
      statusDot.className = 'dot ok';
      statusText.textContent = `${data.mcp_tool_count} tools`;
    } else {
      statusDot.className = 'dot warn';
      statusText.textContent = 'MCP unavailable';
    }
  } catch {
    statusDot.className = 'dot err';
    statusText.textContent = 'Offline';
  }
}

function addMessage(role, content) {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  if (role === 'assistant') {
    div.innerHTML = renderMarkdown(content);
  } else {
    div.textContent = content;
  }
  chatEl.appendChild(div);
  chatEl.scrollTop = chatEl.scrollHeight;
}

function addToolCard(tool) {
  const details = document.createElement('details');
  details.className = 'tool-card';
  const inputStr = JSON.stringify(tool.input, null, 2);
  details.innerHTML = `<summary>🔧 ${tool.tool}(${Object.keys(tool.input).map(k => k+'=…').join(', ')})</summary><pre>${escapeHtml(tool.output)}</pre>`;
  chatEl.appendChild(details);
  chatEl.scrollTop = chatEl.scrollHeight;
}

function addTyping() {
  const div = document.createElement('div');
  div.className = 'typing';
  div.id = 'typing';
  div.textContent = 'Thinking…';
  chatEl.appendChild(div);
  chatEl.scrollTop = chatEl.scrollHeight;
}

function removeTyping() {
  const el = document.getElementById('typing');
  if (el) el.remove();
}

function renderMarkdown(text) {
  let html = escapeHtml(text);
  html = html.replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>');
  html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
  html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  html = html.replace(/\n/g, '<br>');
  return html;
}

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

async function send(text) {
  if (busy || !text.trim()) return;
  busy = true;
  sendBtn.disabled = true;
  inputEl.value = '';
  startersEl.style.display = 'none';

  addMessage('user', text);
  history.push({ role: 'user', content: text });
  addTyping();

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text, history: history.slice(0, -1) }),
    });
    removeTyping();
    const data = await res.json();

    if (data.error) {
      addMessage('assistant', `⚠️ ${data.error}: ${data.message || ''}`);
    } else {
      if (data.tool_calls) {
        for (const tc of data.tool_calls) addToolCard(tc);
      }
      addMessage('assistant', data.response);
      history.push({ role: 'assistant', content: data.response });
    }
  } catch (err) {
    removeTyping();
    addMessage('assistant', `⚠️ Network error: ${err.message}`);
  }

  busy = false;
  sendBtn.disabled = false;
  inputEl.focus();
}

function sendInput() {
  send(inputEl.value);
}

inputEl.addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 120) + 'px';
});

checkHealth();
</script>
</body>
</html>
